name: Publish workflow-safe role routing branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/route-models-by-role'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Build clean tree without workflow changes
        shell: bash
        run: |
          python .github/finalize_role_routing.py
          git checkout ${{ github.event.pull_request.base.sha }} -- .github/workflows/backend-tests.yml
          python - <<'PY'
          from pathlib import Path

          path = Path('src/backend/tests/simulation_quality_controls.py')
          text = path.read_text(encoding='utf-8')
          old = '''            CONTROL_STATS["player_deterministic"] += 1
                      _write_health()
          '''
          new = '''            CONTROL_STATS["player_deterministic"] += 1
                      CONTROL_STATS["player_success"] += 1
                      _write_health()
          '''
          if old not in text:
              raise SystemExit('deterministic player counter block missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/finalize_role_routing.py
          rm -f .github/role-routing-script.gz.b64
          rm -f .github/role-routing-ruff.txt
          rm -f .github/workflows/apply-role-routing.yml
          rm -f .github/workflows/fix-role-routing-lint.yml
          rm -f .github/workflows/fix-role-routing-correctness.yml
          rm -f .github/workflows/export-role-routing-final.yml
          rm -f .github/workflows/publish-role-routing-final.yml
          rm -f .github/workflows/publish-role-routing-final-v2.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e 'src/backend[dev]'

      - name: Compile and focused tests
        run: |
          python -m compileall -q src/backend/app src/backend/tests
          cd src/backend
          pytest -q \
            tests/test_role_model_router.py \
            tests/test_post_turn_scheduling.py \
            tests/test_simulation_quality_controls.py \
            tests/test_turns.py \
            tests/test_provider_and_scribe.py \
            tests/test_memory_scribe_guard.py \
            tests/test_thesis_curator.py \
            tests/test_thesis_curator_lifecycle.py \
            tests/test_llm_provider_resilience.py \
            --tb=short

      - name: Deterministic routing campaign
        working-directory: src/backend
        env:
          PYTHONPATH: "."
          PDM_SIM_MODE: quality
          PDM_SIM_TURNS: "60"
          PDM_SIM_DATA_DIR: ./data/role-routing-publish
          PDM_SIM_RESET: "1"
          PDM_SIM_STOP_ON_PROVIDER_FAILURE: "1"
        run: |
          python tests/run_ci_mock_simulation_v3.py
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('data/role-routing-publish')
          state = json.loads((root / 'realistic_simulation_state.json').read_text())
          health = json.loads((root / 'realistic_simulation_health.json').read_text())
          records = [json.loads(line) for line in (root / 'realistic_simulation_trace.jsonl').read_text().splitlines() if line]
          stats = health['control_stats']
          assert state['completed'] is True
          assert health['valid'] is True
          assert stats.get('player_deterministic', 0) == len(records)
          assert stats.get('player_success', 0) == len(records)
          assert stats.get('player_calls', 0) == 0
          assert stats.get('curator_calls', 0) < len(records)
          assert stats.get('evaluator_calls', 0) < len(records)
          assert all(not (r.get('player') or {}).get('fallback') for r in records)
          print('ROLE_ROUTING_STATS', json.dumps(stats, sort_keys=True))
          PY

      - name: Lint
        run: >-
          ruff check
          src/backend/app/config.py
          src/backend/app/services/role_model_router.py
          src/backend/app/services/memory_scribe.py
          src/backend/app/services/thesis_curator.py
          src/backend/app/services/post_turn_processor.py
          src/backend/app/db/repositories/turn_repo.py
          src/backend/app/api/world_state.py
          src/backend/tests/run_realistic_simulation.py
          src/backend/tests/run_realistic_simulation_v2.py
          src/backend/tests/simulation_quality_controls.py
          src/backend/tests/test_role_model_router.py
          src/backend/tests/test_post_turn_scheduling.py
          src/backend/tests/test_simulation_quality_controls.py

      - name: Publish one clean commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --soft ${{ github.event.pull_request.base.sha }}
          git add -A
          git commit -m "Распределить LLM-роли между Gemma и Qwen"
          git push --force origin HEAD:agent/route-models-by-role-final

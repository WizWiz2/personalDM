name: Playable debugger milestone

on:
  push:
    branches:
      - "feature/playable-debugger-foundation"
  pull_request:
    paths:
      - "src/backend/**"
      - ".github/workflows/playable-debugger.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - run: python -m pip install -e "src/backend[dev]"
      - name: Compile
        run: python -m compileall -q src/backend/app src/backend/tests
      - name: Migration cycle
        working-directory: src/backend
        run: |
          rm -rf data
          alembic upgrade head
          alembic downgrade 7f4b8d2c91aa
          alembic upgrade head
      - name: New milestone tests
        working-directory: src/backend
        run: pytest -q tests/test_playable_debugger_foundation.py --tb=short
      - name: Full backend tests
        working-directory: src/backend
        run: pytest -q --tb=short
      - name: Lint new milestone files
        run: >-
          ruff check
          src/backend/app/api/archive.py
          src/backend/app/api/debugger.py
          src/backend/app/db/repositories/job_repo.py
          src/backend/app/models/jobs.py
          src/backend/app/services/campaign_archive.py
          src/backend/app/services/debugger_service.py
          src/backend/app/services/post_turn_processor.py
          src/backend/tests/test_playable_debugger_foundation.py

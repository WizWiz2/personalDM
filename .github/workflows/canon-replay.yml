name: Canon replay round-trip

on:
  push:
    branches:
      - "agent/full-canon-replay-roundtrip"
  pull_request:
    paths:
      - "src/backend/**"
      - "docs/CANON-REPLAY-ROUNDTRIP.md"
      - ".github/workflows/canon-replay.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - run: python -m pip install -e "src/backend[dev]"
      - name: Compile
        run: python -m compileall -q src/backend/app src/backend/tests
      - name: Migration cycle
        working-directory: src/backend
        run: |
          rm -rf data
          alembic upgrade head
          alembic downgrade c1a2b3c4d5e6
          alembic upgrade head
      - name: Canon replay and round-trip tests
        working-directory: src/backend
        run: pytest -q tests/test_canon_replay_roundtrip.py --tb=short
      - name: Full backend tests
        working-directory: src/backend
        run: pytest -q --tb=short
      - name: Lint replay milestone
        run: >-
          ruff check
          src/backend/alembic/versions/d2e3f4a5b6c7_initial_world_snapshot.py
          src/backend/app/api/archive.py
          src/backend/app/api/world_state.py
          src/backend/app/services/campaign_archive.py
          src/backend/app/services/canon_applier.py
          src/backend/app/services/debugger_service.py
          src/backend/app/services/world_state_snapshot.py
          src/backend/tests/test_canon_replay_roundtrip.py

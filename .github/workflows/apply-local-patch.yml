name: Apply remaining playable debugger patch

on:
  push:
    branches:
      - "feature/playable-debugger-foundation"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply compressed patch and clean transport files
        shell: bash
        run: |
          if [ ! -f .github/remaining-playable-debugger.patch.gz.b64 ]; then
            echo "Patch payload not present yet"
            exit 0
          fi
          base64 --decode .github/remaining-playable-debugger.patch.gz.b64 | gzip --decompress > /tmp/remaining.patch
          git apply --index /tmp/remaining.patch
          git rm .github/remaining-playable-debugger.patch.gz.b64 .github/workflows/apply-local-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Добавить durable pipeline и Campaign Debugger"
          git push

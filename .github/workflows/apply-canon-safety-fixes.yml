name: Apply canon safety fixes

on:
  push:
    branches:
      - agent/canon-safety-fixes-2

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/canon-safety-fixes-2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - name: Apply focused patch
        run: python tools/apply_canon_safety_fixes.py
      - name: Install backend
        run: python -m pip install -e 'src/backend[dev]'
      - name: Compile
        run: python -m compileall -q src/backend/app src/backend/tests
      - name: Focused tests
        working-directory: src/backend
        run: >-
          pytest -q
          tests/test_canon_safety_fixes.py
          tests/test_context.py
          tests/test_memory_scribe_aliases.py
          tests/test_thesis_curator.py
          tests/test_world_state.py
          --tb=short
      - name: Lint changed files
        run: >-
          ruff check
          src/backend/app/services/context_compiler.py
          src/backend/app/services/memory_scribe.py
          src/backend/app/services/thesis_curator.py
          src/backend/app/db/repositories/scene_repo.py
          src/backend/app/api/scenes.py
          src/backend/app/api/world_state.py
          src/backend/tests/test_canon_safety_fixes.py
          src/backend/tests/test_memory_scribe_aliases.py
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Исправить границы контекста и целостность канона'
          git push origin HEAD:agent/canon-safety-fixes-2

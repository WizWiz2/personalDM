name: Replay source snapshot

on:
  push:
    branches:
      - "agent/full-canon-replay-roundtrip"
  pull_request:
    paths:
      - ".github/workflows/source-snapshot-replay.yml"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: personaldm-replay-source
          path: |
            .github
            docs
            src
            README.md
          retention-days: 1

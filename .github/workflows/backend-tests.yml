name: Backend tests

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    paths:
      - "src/backend/**"
      - "test/backend/tests/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml

      - name: Install backend and test dependencies
        run: python -m pip install -e "src/backend[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src/backend/app src/backend/tests test/backend/tests

      - name: Validate database migrations
        working-directory: src/backend
        run: |
          rm -rf data
          alembic upgrade head
          alembic downgrade 293b3517b6ac
          alembic upgrade head

      - name: Test campaigns
        working-directory: src/backend
        run: pytest -q tests/test_campaign.py --tb=short

      - name: Test context boundaries
        working-directory: src/backend
        run: pytest -q tests/test_context.py --tb=short

      - name: Test canon proposals
        working-directory: src/backend
        run: pytest -q tests/test_proposals.py --tb=short

      - name: Test canon semantics and versioning
        working-directory: src/backend
        run: pytest -q tests/test_canon_semantics.py tests/test_canon_versioning.py tests/test_memory_scribe_guard.py --tb=short

      - name: Test dynamic scene theses
        working-directory: src/backend
        run: pytest -q tests/test_thesis_curator.py tests/test_thesis_curator_lifecycle.py --tb=short

      - name: Test character cards and world state
        working-directory: src/backend
        run: pytest -q tests/test_world_state.py --tb=short

      - name: Test simulation director
        working-directory: src/backend
        run: pytest -q tests/test_simulation_director.py tests/test_simulation_quality_controls.py --tb=short

      - name: Test turn lifecycle
        working-directory: src/backend
        run: pytest -q tests/test_turns.py --tb=short

      - name: Test legacy provider and Scribe contracts
        working-directory: src/backend
        run: pytest -q tests/test_provider_and_scribe.py --tb=short

      - name: Test provider resilience
        working-directory: src/backend
        run: pytest -q tests/test_llm_provider_resilience.py --tb=short

      - name: Test Scribe alias resolution
        working-directory: src/backend
        run: pytest -q tests/test_memory_scribe_aliases.py --tb=short

      - name: Run deterministic end-to-end campaign in quality mode
        working-directory: src/backend
        env:
          PYTHONPATH: "."
          PDM_SIM_MODE: "quality"
          PDM_SIM_TURNS: "60"
          PDM_SIM_DATA_DIR: "./data/ci-v3"
          PDM_SIM_RESET: "1"
          PDM_SIM_STOP_ON_PROVIDER_FAILURE: "1"
        run: python tests/run_ci_mock_simulation_v3.py

      - name: Validate simulation invariants
        working-directory: src/backend
        run: |
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          root = Path("data/ci-v3")
          state = json.loads((root / "realistic_simulation_state.json").read_text(encoding="utf-8"))
          health = json.loads((root / "realistic_simulation_health.json").read_text(encoding="utf-8"))
          records = [json.loads(line) for line in (root / "realistic_simulation_trace.jsonl").read_text(encoding="utf-8").splitlines() if line.strip()]
          report = (root / "realistic_simulation_report.md").read_text(encoding="utf-8")

          assert state["completed"] is True, state
          assert state["phase_index"] == 10, state
          assert health["mode"] == "quality", health
          assert health["valid"] is True, health
          assert health["control_stats"].get("player_success", 0) > 0, health
          assert health["control_stats"].get("evaluator_success", 0) > 0, health
          assert health["control_stats"].get("scribe_success", 0) > 0, health
          assert health["control_stats"].get("curator_success", 0) > 0, health
          assert health["control_stats"].get("scribe_outcomes", 0) > 0, health
          assert health["control_stats"].get("scribe_outcomes", 0) == health["control_stats"].get("scribe_covered_outcomes", -1), health
          assert len(records) == len({record["turn"] for record in records})
          assert all(not record.get("generation_failed") for record in records)
          assert all(not (record.get("player") or {}).get("fallback") for record in records)
          assert len({record["player"]["intent"] for record in records}) >= len(records) * 0.8
          assert "Benchmark valid: **True**" in report
          assert "Фаз завершено: 10/10" in report
          assert "Active theses in completed scenes: 0" in report
          assert "Actor contexts/current-message omissions:" in report

          db = sqlite3.connect(root / "realistic_simulation.db")
          campaign_id = state["campaign_id"]
          integrity = db.execute("PRAGMA integrity_check").fetchone()[0]
          fk_violations = db.execute("PRAGMA foreign_key_check").fetchall()
          assert integrity == "ok"
          assert fk_violations == []

          characters = db.execute(
              "SELECT COUNT(*) FROM entities WHERE campaign_id=? AND entity_type='character'",
              (campaign_id,),
          ).fetchone()[0]
          outcomes = db.execute(
              "SELECT COUNT(*) FROM events WHERE campaign_id=? AND event_type='scene_outcome'",
              (campaign_id,),
          ).fetchone()[0]
          proposals = db.execute(
              """SELECT COUNT(*) FROM proposed_changes pc
                 JOIN turns t ON t.id=pc.turn_id
                 WHERE t.campaign_id=?""",
              (campaign_id,),
          ).fetchone()[0]
          canon_gaps = db.execute(
              """SELECT COUNT(*) FROM proposed_changes pc
                 JOIN turns t ON t.id=pc.turn_id
                 WHERE t.campaign_id=? AND pc.change_type='canon_gap'""",
              (campaign_id,),
          ).fetchone()[0]
          sourced_beliefs = db.execute(
              """SELECT COUNT(*) FROM beliefs b
                 JOIN entities e ON e.id=b.character_id
                 WHERE e.campaign_id=? AND b.source_turn_id IS NOT NULL""",
              (campaign_id,),
          ).fetchone()[0]
          stale = db.execute(
              """SELECT COUNT(*) FROM scene_theses st
                 JOIN scenes s ON s.id=st.scene_id
                 WHERE s.campaign_id=? AND s.status='completed' AND st.status='active'""",
              (campaign_id,),
          ).fetchone()[0]
          duplicate_scopes = db.execute(
              """SELECT COUNT(*) FROM (
                   SELECT st.scene_id, st.thesis_type, COALESCE(st.related_entity_ids, ''), COUNT(*) AS n
                   FROM scene_theses st
                   JOIN scenes s ON s.id=st.scene_id
                   WHERE s.campaign_id=? AND st.status='active'
                   GROUP BY st.scene_id, st.thesis_type, COALESCE(st.related_entity_ids, '')
                   HAVING n > 1
                 )""",
              (campaign_id,),
          ).fetchone()[0]
          actor_missing = 0
          actor_total = 0
          for snapshot_raw, in db.execute(
              """SELECT context_snapshot FROM turns
                 WHERE campaign_id=? AND role='assistant' AND acting_character_id IS NOT NULL""",
              (campaign_id,),
          ):
              actor_total += 1
              snapshot = json.loads(snapshot_raw or "{}")
              if not snapshot.get("current_user_reserved"):
                actor_missing += 1
          db.close()

          assert characters == 21, characters
          assert outcomes == 10, outcomes
          assert proposals > 0, proposals
          assert canon_gaps == 0, canon_gaps
          assert sourced_beliefs > 0, sourced_beliefs
          assert stale == 0, stale
          assert duplicate_scopes == 0, duplicate_scopes
          assert actor_total > 0, actor_total
          assert actor_missing == 0, actor_missing
          print("Validated", len(records), "quality logical turns with complete canon coverage")
          PY

      - name: Upload simulation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: personaldm-quality-simulation
          path: src/backend/data/ci-v3/
          retention-days: 7
